<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05040c" />
    <title>SubCraft — Sous-titres IA pour YouTube Shorts & TikTok</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Anton&family=Bebas+Neue&family=Montserrat:wght@700;800;900&family=Oswald:wght@600;700&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #05040c; color: #f8fafc; font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }
      /* Loading screen */
      #loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 14px; background: #05040c; }
      .ldr { width: 44px; height: 44px; border-radius: 13px; background: linear-gradient(135deg, #7c3aed, #a855f7); display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 40px rgba(124,58,237,.5); }
      @keyframes spin { to { transform: rotate(360deg); } }
      .ldr-ring { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
      .ldr-txt { font-size: 12px; color: rgba(255,255,255,.3); letter-spacing: .1em; font-family: sans-serif; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">
        <div class="ldr">✦</div>
        <div class="ldr-ring"></div>
        <div class="ldr-txt">SUBCRAFT</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
